# Docker Compose – Ollama + Open-WebUI + ComfyUI + VRAM Manager
#
# Prerequisites:
#   - Docker Engine with GPU support (nvidia-docker2)
#   - NVIDIA Container Toolkit installed
#
# Setup:
#   cp .env.example .env   # then edit .env and set WEBUI_SECRET_KEY
#   docker compose up -d

networks:
  ai-stack:
    driver: bridge
    name: ai-stack-network

services:
  # -------------------------------------------------
  # Ollama – LLM inference engine
  # -------------------------------------------------
  ollama:
    image: ${OLLAMA_IMAGE:-ollama/ollama:latest}
    container_name: ${OLLAMA_CONTAINER_NAME:-aistack-ollama}
    restart: ${RESTART_POLICY:-unless-stopped}
    networks:
      - ai-stack
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - aistack-ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST:-0.0.0.0}
      - OLLAMA_ORIGINS=${OLLAMA_ORIGINS:-*}
      - OLLAMA_MAX_VRAM=${OLLAMA_MAX_VRAM:-10737418240}
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-2}
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-2}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ollama --version || exit 1
      interval: 300s
      timeout: 10s
      retries: 3
      start_period: 30s
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # -------------------------------------------------
  # Open-WebUI – Chat frontend for Ollama
  # -------------------------------------------------
  open-webui:
    image: ${OPENWEBUI_IMAGE:-ghcr.io/open-webui/open-webui:main}
    container_name: ${OPENWEBUI_CONTAINER_NAME:-aistack-open-webui}
    restart: ${RESTART_POLICY:-unless-stopped}
    networks:
      - ai-stack
    ports:
      - "${OPENWEBUI_PORT:-3000}:8080"
    volumes:
      - aistack-open_webui_data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://aistack-ollama:11434}
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:?Set WEBUI_SECRET_KEY in .env (generate with: openssl rand -hex 32)}
      - WEBUI_AUTH=${WEBUI_AUTH:-true}
      - WEBUI_NAME=${WEBUI_NAME:-Open WebUI}
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health || exit 1"]
      interval: 300s
      timeout: 10s
      retries: 3
      start_period: 45s
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # -------------------------------------------------
  # ComfyUI – Stable Diffusion Web UI
  # -------------------------------------------------
  comfyui:
    image: ${COMFYUI_IMAGE:-yanwk/comfyui-boot:cu128-slim}
    container_name: ${COMFYUI_CONTAINER_NAME:-aistack-comfyui}
    restart: ${RESTART_POLICY:-unless-stopped}
    networks:
      - ai-stack
    ports:
      - "${COMFYUI_PORT:-8188}:8188"
    volumes:
      - aistack-comfyui_data:/root/ComfyUI/user
      - ./data/comfyui/models:/root/ComfyUI/models
      - ./data/comfyui/custom_nodes:/root/ComfyUI/custom_nodes
    environment:
      - CLI_ARGS=${COMFYUI_CLI_ARGS:---normalvram}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8188/system_stats || exit 1"]
      interval: 300s
      timeout: 10s
      retries: 3
      start_period: 60s
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # -------------------------------------------------
  # VRAM Manager – Automatic VRAM optimization
  # Monitors Ollama model loading and frees ComfyUI VRAM
  # to prevent Ollama from falling back to CPU mode.
  # -------------------------------------------------
  vram-manager:
    image: python:3.11-slim
    container_name: ${VRAM_MANAGER_CONTAINER_NAME:-aistack-vram-manager}
    restart: ${RESTART_POLICY:-unless-stopped}
    networks:
      - ai-stack
    volumes:
      - ./scripts:/app/scripts:ro
    working_dir: /app
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        pip install --no-cache-dir requests &&
        python /app/scripts/vram_manager.py \
          --ollama-url http://aistack-ollama:11434 \
          --comfyui-url http://aistack-comfyui:${COMFYUI_INTERNAL_PORT:-8188} \
          --check-interval ${VRAM_CHECK_INTERVAL:-5} \
          --vram-threshold ${VRAM_THRESHOLD:-75}
    depends_on:
      ollama:
        condition: service_healthy
      comfyui:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  aistack-ollama_data:
    driver: local
    name: aistack-ollama_data
  aistack-open_webui_data:
    driver: local
    name: aistack-open_webui_data
  aistack-comfyui_data:
    driver: local
    name: aistack-comfyui_data
